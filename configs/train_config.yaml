# Training configuration for neural video matting

# Data
data:
  root: "data/VideoMatte240K"
  clip_length: 8
  output_size: [512, 512]
  crop_size: [512, 512]
  random_flip: true
  random_affine: true

# Training
batch_size: 2
num_workers: 4
epochs: 100
warmup_epochs: 5
learning_rate: 1.0e-4
min_lr: 1.0e-6
weight_decay: 1.0e-2
mixed_precision: true

# Loss weights
loss_weights:
  alpha_l1: 1.0
  laplacian: 1.0
  gradient: 0.5
  temporal: 0.5
  foreground: 0.5

# Checkpointing
checkpoint_dir: "checkpoints"
save_interval: 10
val_interval: 5

# Logging
use_wandb: false
wandb_project: "neural-video-matting"
