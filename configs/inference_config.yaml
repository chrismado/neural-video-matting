# Inference configuration for neural video matting

# Model
checkpoint: "checkpoints/final.pth"

# Inference
device: "cuda"
output_size: null  # null = keep original resolution
batch_size: 1

# Serving
host: "0.0.0.0"
port: 8000
max_video_frames: 10000
max_resolution: [1920, 1080]
temp_dir: "/tmp/matting_temp"

# Compositing
spill_suppression: true
spill_strength: 0.5
